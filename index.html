<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Boğaziçi Üniversitesi — Veri Yönetim Sistemi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="login-page">
      <aside class="brand-panel" aria-label="Boğaziçi Üniversitesi">
        <img class="brand-photo" src="assets/campus-boun-2.jpg?v=14" alt="" />
        <div class="brand-overlay" aria-hidden="true"></div>
        <div class="brand-content">
          <p class="brand-uni">Boğaziçi Üniversitesi</p>
          <h1 class="brand-title">Veri Yönetim Sistemi</h1>
          <p class="brand-desc">
            Öğrenci, akademisyen ve idari personel için merkezi veri yönetim platformu.
          </p>
        </div>
        <footer class="brand-footer">
          <span>© 2026 Boğaziçi Üniversitesi</span>
          <nav class="brand-footer-links" aria-label="Alt bağlantılar">
            <a href="#">KVKK</a>
            <a href="#">Destek</a>
          </nav>
        </footer>
      </aside>

      <main class="form-panel">
        <div class="form-toolbar">
          <button type="button" class="icon-btn" id="themeToggle" aria-label="Tema değiştir" title="Tema">
            <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
              <circle cx="12" cy="12" r="4" />
              <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" />
            </svg>
            <svg class="icon-moon is-hidden" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
              <path d="M21 14.5A8.5 8.5 0 1 1 9.5 3a7 7 0 0 0 11.5 11.5z" />
            </svg>
          </button>
          <div class="lang-select" id="langSelect">
            <button type="button" class="lang-btn" aria-haspopup="listbox" aria-expanded="false">
              <span id="langLabel">TR</span>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path d="M6 9l6 6 6-6" />
              </svg>
            </button>
            <ul class="lang-menu" role="listbox" hidden>
              <li role="option" data-lang="tr" aria-selected="true">TR</li>
              <li role="option" data-lang="en" aria-selected="false">EN</li>
            </ul>
          </div>
        </div>

        <div class="form-center">
          <div class="form-card">
            <div class="form-brand">
              <img
                class="form-logo"
                src="assets/logo-official.png?v=11"
                alt="Boğaziçi Üniversitesi"
                width="112"
                height="112"
              />
              <h2 class="form-heading" data-i18n="signIn">Giriş Yap</h2>
              <p class="form-sub" data-i18n="signInHint">Hesabınıza erişmek için bilgilerinizi girin.</p>
            </div>

            <form class="login-form" id="loginForm" novalidate>
              <label class="field">
                <span class="sr-only" data-i18n="email">E-posta</span>
                <span class="field-icon" aria-hidden="true">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
                    <rect x="3" y="5" width="18" height="14" rx="2" />
                    <path d="M3 7l9 6 9-6" />
                  </svg>
                </span>
                <input
                  type="email"
                  id="email"
                  name="email"
                  placeholder="E-posta"
                  data-i18n-placeholder="email"
                  autocomplete="username"
                  required
                />
              </label>

              <label class="field">
                <span class="sr-only" data-i18n="password">Şifre</span>
                <span class="field-icon" aria-hidden="true">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
                    <rect x="5" y="11" width="14" height="10" rx="2" />
                    <path d="M8 11V8a4 4 0 0 1 8 0v3" />
                  </svg>
                </span>
                <input
                  type="password"
                  id="password"
                  name="password"
                  placeholder="Şifre"
                  data-i18n-placeholder="password"
                  autocomplete="current-password"
                  required
                />
                <button type="button" class="field-action" id="togglePassword" aria-label="Şifreyi göster">
                  <svg class="icon-eye is-hidden" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
                    <path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7S2 12 2 12z" />
                    <circle cx="12" cy="12" r="3" />
                  </svg>
                  <svg class="icon-eye-off" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
                    <path d="M17.94 17.94A10.94 10.94 0 0 1 12 19c-6 0-10-7-10-7a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A10.94 10.94 0 0 1 12 5c6 0 10 7 10 7a18.5 18.5 0 0 1-2.16 3.19" />
                    <path d="M1 1l22 22" />
                    <path d="M14.12 14.12A3 3 0 0 1 9.88 9.88" />
                  </svg>
                </button>
              </label>

              <div class="form-options">
                <label class="remember">
                  <input type="checkbox" id="remember" name="remember" />
                  <span data-i18n="remember">Beni Hatırla</span>
                </label>
                <a href="#" class="forgot" data-i18n="forgot">Şifremi Unuttum</a>
              </div>

              <button type="submit" class="submit-btn" data-i18n="login">Giriş Yap</button>
              <p class="form-message" id="formMessage" role="status" aria-live="polite" hidden></p>
            </form>
          </div>
        </div>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
